name: publish

# Publish to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC): no API token secret is needed, but the
# repository/workflow must be registered as a trusted publisher on PyPI once
# (PyPI project -> Settings -> Publishing -> add a GitHub Actions publisher
#  with workflow name "publish.yml").
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
