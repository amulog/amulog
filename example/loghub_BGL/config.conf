# amulog example: generate log templates from the BGL 2k sample with drain.
#   python -m amulog db-make -c config.conf
# Options not listed fall back to defaults (python -m amulog conf-defaults).

[general]
src_path = BGL_2k.log
src_recur = false
logging =

[database]
database = sqlite3
sqlite3_filename = log.db

[manager]
parser_script = parser.py

[log_template]
lt_methods = drain
ltgroup_alg = none
