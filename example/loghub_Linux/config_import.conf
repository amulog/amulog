# amulog example: classify the Linux 2k sample with the bundled amulog
# templates (Linux.tpl) instead of generating them.
#   python -m amulog db-make -c config_import.conf

[general]
src_path = Linux_2k.log
src_recur = false
logging =

[database]
database = sqlite3
sqlite3_filename = log.db

[manager]
parser_script = parser.py

[log_template]
lt_methods = import
ltgroup_alg = none

[log_template_import]
def_path = Linux.tpl
import_format = plain
search_method = tree
